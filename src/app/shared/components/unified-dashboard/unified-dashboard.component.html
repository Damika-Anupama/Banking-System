<!-- Customer Dashboard Layout (original style with different structure) -->
<div *ngIf="isCustomerDashboard()" class="min-h-screen flex">
  <!-- Sidebar -->
  <aside class="sidebar-wrapper glass-sidebar hidden lg:flex lg:flex-col w-64 fixed h-full z-20">
    <!-- Logo -->
    <div class="p-6 border-b border-white/10">
      <a [routerLink]="config.logoRoute" class="flex items-center justify-center">
        <img
          [src]="(isDarkMode$ | async) ? 'assets/logo-dark.png' : 'assets/logo.png'"
          alt="Banking System logo"
          class="h-32 w-auto max-w-full rounded-2xl px-4 py-3 object-contain shadow-lg ring-1"
          [ngClass]="(isDarkMode$ | async) ? 'bg-slate-950 ring-cyan-300/20' : 'bg-white ring-slate-200'"
        >
      </a>
    </div>

    <!-- Navigation Menu -->
    <nav class="flex-1 px-4 py-6 overflow-y-auto">
      <ul class="space-y-2">
        <li *ngFor="let item of navigationItems">
          <a
            [routerLink]="item.route"
            routerLinkActive="active-link"
            class="nav-link-item flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-300 hover:bg-white/10"
          >
            <i [class]="'fas ' + item.icon + ' text-xl'"></i>
            <span class="font-medium">{{ item.label }}</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Footer Links -->
    <div class="p-4 border-t border-white/10">
      <div class="mb-4 grid grid-cols-3 gap-2">
        <button class="sidebar-action-btn" aria-label="Toggle theme" (click)="toggleTheme()"><i class="fas" [ngClass]="(isDarkMode$ | async) ? 'fa-sun' : 'fa-moon'"></i></button>
        <a [routerLink]="getSettingsRoute()" class="sidebar-action-btn" title="Settings" aria-label="Open settings"><i class="fas fa-cog"></i></a>
        <button class="sidebar-action-btn" aria-label="Logout" (click)="exit()"><i class="fas fa-sign-out-alt"></i></button>
      </div>
      <p class="text-white/50 text-xs text-center">
        &copy; {{ currentYear }} Banking System<br>
        <span class="text-white/40">Client demo</span>
      </p>
    </div>
  </aside>

  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col lg:ml-64">
    <!-- Top Navbar -->
    <header class="glass-navbar sticky top-0 z-10 lg:hidden">
      <div class="flex items-center justify-between px-4 lg:px-8 py-4">
        <!-- Mobile Menu Button & Logo -->
        <div class="flex items-center gap-4">
          <button
            class="lg:hidden text-white p-2 hover:bg-white/10 rounded-lg transition-colors"
            aria-label="Open navigation menu"
            (click)="toggleSidebar()"
          >
            <i class="fas fa-bars text-xl"></i>
          </button>
          <img
            [src]="(isDarkMode$ | async) ? 'assets/logo-dark.png' : 'assets/logo.png'"
            alt="Banking System logo"
            class="h-10 w-auto lg:hidden"
          >
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 p-4 lg:p-8 overflow-y-auto">
      <div class="max-w-7xl mx-auto">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>

  <!-- Mobile Sidebar Overlay -->
  <div
    *ngIf="isSidebarOpen"
    class="fixed inset-0 bg-black/50 backdrop-blur-sm z-30 lg:hidden"
    (click)="toggleSidebar()"
  ></div>

  <!-- Mobile Sidebar -->
  <aside
    *ngIf="isSidebarOpen"
    class="sidebar-wrapper glass-sidebar flex flex-col w-64 fixed h-full z-40 lg:hidden animate-slide-right"
  >
    <!-- Logo -->
    <div class="p-6 border-b border-white/10 flex items-center justify-between">
      <a [routerLink]="config.logoRoute" class="flex items-center">
        <img
          [src]="(isDarkMode$ | async) ? 'assets/logo-dark.png' : 'assets/logo.png'"
          alt="Banking System logo"
          class="h-28 w-auto max-w-full rounded-2xl px-4 py-3 object-contain shadow-lg ring-1"
          [ngClass]="(isDarkMode$ | async) ? 'bg-slate-950 ring-cyan-300/20' : 'bg-white ring-slate-200'"
        >
      </a>
      <button
        class="text-white p-2 hover:bg-white/10 rounded-lg transition-colors"
        aria-label="Close navigation menu"
        (click)="toggleSidebar()"
      >
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>

    <!-- Navigation Menu -->
    <nav class="flex-1 px-4 py-6 overflow-y-auto">
      <ul class="space-y-2">
        <li *ngFor="let item of navigationItems">
          <a
            [routerLink]="item.route"
            routerLinkActive="active-link"
            class="nav-link-item flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-300 hover:bg-white/10"
            (click)="toggleSidebar()"
          >
            <i [class]="'fas ' + item.icon + ' text-xl'"></i>
            <span class="font-medium">{{ item.label }}</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Footer Links -->
    <div class="p-4 border-t border-white/10">
      <div class="mb-4 grid grid-cols-3 gap-2">
        <button class="sidebar-action-btn" aria-label="Toggle theme" (click)="toggleTheme()"><i class="fas" [ngClass]="(isDarkMode$ | async) ? 'fa-sun' : 'fa-moon'"></i></button>
        <a [routerLink]="getSettingsRoute()" class="sidebar-action-btn" title="Settings" aria-label="Open settings"><i class="fas fa-cog"></i></a>
        <button class="sidebar-action-btn" aria-label="Logout" (click)="exit()"><i class="fas fa-sign-out-alt"></i></button>
      </div>
      <p class="text-white/50 text-xs text-center">
        &copy; {{ currentYear }} Banking System<br>
        <span class="text-white/40">Client demo</span>
      </p>
    </div>
  </aside>
</div>

<!-- Employee/Manager Dashboard Layout -->
<div *ngIf="!isCustomerDashboard()" class="min-h-screen">
  <!-- Mobile Sidebar Overlay -->
  <div
    *ngIf="isSidebarOpen"
    class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 lg:hidden"
    (click)="toggleSidebar()"
  ></div>

  <!-- Sidebar -->
  <aside
    class="fixed left-0 top-0 h-full w-72 glass-sidebar z-50 transform transition-transform duration-300 ease-in-out"
    [ngClass]="{'translate-x-0': isSidebarOpen, '-translate-x-full': !isSidebarOpen, 'lg:translate-x-0': true}"
  >
    <!-- Logo -->
    <div class="p-6 border-b border-white/10">
      <a [routerLink]="config.logoRoute" class="flex items-center gap-3">
        <img [src]="(isDarkMode$ | async) ? 'assets/logo-dark.png' : 'assets/logo.png'" alt="Banking System logo" class="h-32 w-auto max-w-full rounded-2xl px-4 py-3 object-contain shadow-lg ring-1"
          [ngClass]="(isDarkMode$ | async) ? 'bg-slate-950 ring-cyan-300/20' : 'bg-white ring-slate-200'" />
      </a>
    </div>

    <!-- Navigation -->
    <nav class="p-4 space-y-2">
      <a
        *ngFor="let item of navigationItems"
        [routerLink]="item.route"
        routerLinkActive="active-nav-item"
        class="nav-item"
      >
        <i [class]="'fas ' + item.icon + ' nav-icon'"></i>
        <span>{{ item.label }}</span>
      </a>
    </nav>

    <!-- Footer -->
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-white/10">
      <div class="mb-4 grid grid-cols-3 gap-2">
        <button class="sidebar-action-btn" aria-label="Toggle theme" (click)="toggleTheme()"><i class="fas" [ngClass]="(isDarkMode$ | async) ? 'fa-sun' : 'fa-moon'"></i></button>
        <a [routerLink]="getSettingsRoute()" class="sidebar-action-btn" title="Settings" aria-label="Open settings"><i class="fas fa-cog"></i></a>
        <button class="sidebar-action-btn" aria-label="Logout" (click)="exit()"><i class="fas fa-sign-out-alt"></i></button>
      </div>
      <div class="text-white/60 text-xs text-center">
        <p class="font-semibold text-white/80 mb-1">Banking System</p>
        <p>Client demo</p>
        <p class="mt-2">© {{ currentYear }}</p>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="lg:ml-72">
    <!-- Top Navbar -->
    <nav class="glass-navbar sticky top-0 z-30 lg:hidden">
      <div class="flex items-center justify-between">
        <!-- Left: Mobile Menu Button -->
        <button
          class="lg:hidden p-2 rounded-lg hover:bg-white/10 transition-colors text-white"
          aria-label="Open navigation menu"
          (click)="toggleSidebar()"
        >
          <i class="fas fa-bars text-xl"></i>
        </button>
      </div>
    </nav>

    <!-- Page Content -->
    <main class="p-6 min-h-screen">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
