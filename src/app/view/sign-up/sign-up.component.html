<main class="auth-shell">
  <section class="auth-panel">
    <div class="auth-card max-w-2xl animate-scale-in">
      <div class="text-center">
        <img src="assets/logo-dark.png" alt="Banking System logo" class="auth-logo logo-dark-static auth-entry-logo" />
        <h1 class="auth-title text-3xl sm:text-4xl">Create your account</h1>
        <p class="auth-subtitle text-sm sm:text-base">Set up access details and continue directly into the customer workspace.</p>
      </div>

      <form #signupForm="ngForm" (ngSubmit)="submitSignup(signupForm.valid)" class="mt-7 space-y-5" novalidate>
        <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
          <div>
            <label for="signup-name" class="auth-field-label"><i class="fas fa-user mr-2"></i>Full name</label>
            <input id="signup-name" name="fullName" type="text" #fullNameModel="ngModel" [(ngModel)]="fullName" required minlength="3" autocomplete="name" placeholder="Amara Perera" class="glass-input w-full" [class.auth-input-error]="fullNameModel.invalid && (fullNameModel.dirty || fullNameModel.touched || submitted)" />
            <p *ngIf="fullNameModel.invalid && (fullNameModel.dirty || fullNameModel.touched || submitted)" class="auth-error-text">Enter your full name.</p>
          </div>
          <div>
            <label for="signup-email" class="auth-field-label"><i class="fas fa-envelope mr-2"></i>Email address</label>
            <input id="signup-email" name="email" type="email" #emailModel="ngModel" [(ngModel)]="email" required email autocomplete="email" placeholder="amara@example.com" class="glass-input w-full" [class.auth-input-error]="emailModel.invalid && (emailModel.dirty || emailModel.touched || submitted)" />
            <p *ngIf="emailModel.invalid && (emailModel.dirty || emailModel.touched || submitted)" class="auth-error-text">Enter a valid email address.</p>
          </div>
        </div>

        <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
          <div>
            <label for="signup-password" class="auth-field-label"><i class="fas fa-lock mr-2"></i>Password</label>
            <input id="signup-password" name="password" type="password" #passwordModel="ngModel" [(ngModel)]="password" required minlength="8" autocomplete="new-password" placeholder="Minimum 8 characters" class="glass-input w-full" [class.auth-input-error]="passwordModel.invalid && (passwordModel.dirty || passwordModel.touched || submitted)" />
            <p *ngIf="passwordModel.invalid && (passwordModel.dirty || passwordModel.touched || submitted)" class="auth-error-text">Use at least 8 characters.</p>
          </div>
          <div>
            <label for="signup-confirm-password" class="auth-field-label"><i class="fas fa-lock mr-2"></i>Confirm password</label>
            <input id="signup-confirm-password" name="confirmPassword" type="password" #confirmPasswordModel="ngModel" [(ngModel)]="confirmPassword" required autocomplete="new-password" placeholder="Retype password" class="glass-input w-full" [class.auth-input-error]="(confirmPasswordModel.invalid || passwordsDoNotMatch()) && (confirmPasswordModel.dirty || confirmPasswordModel.touched || submitted)" />
            <p *ngIf="confirmPasswordModel.invalid && (confirmPasswordModel.dirty || confirmPasswordModel.touched || submitted)" class="auth-error-text">Confirm your password.</p>
            <p *ngIf="passwordsDoNotMatch() && (confirmPasswordModel.dirty || confirmPasswordModel.touched || submitted)" class="auth-error-text">Passwords must match.</p>
          </div>
        </div>

        <label for="agreeTerms" class="flex items-start gap-3 rounded-2xl border border-white/10 bg-white/[0.06] p-4 text-sm text-slate-300">
          <input id="agreeTerms" name="terms" type="checkbox" #termsModel="ngModel" [(ngModel)]="acceptedTerms" required class="mt-1 h-4 w-4 rounded border-white/30 bg-white/20 text-cyan-500 focus:ring-cyan-300" />
          <span>I agree to continue into the secure customer workspace.</span>
        </label>
        <p *ngIf="termsModel.invalid && submitted" class="auth-error-text">Please accept before continuing.</p>

        <button type="submit" class="glass-button w-full justify-center py-4">
          <span class="flex items-center justify-center gap-3">
            Create account and open dashboard
            <i class="fas fa-arrow-right"></i>
          </span>
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-slate-300">
        Already have access?
        <a routerLink="/sign-in" class="auth-link ml-1">Sign in</a>
      </p>
    </div>
  </section>
</main>
