<main class="auth-shell">
  <section class="auth-panel">
    <div class="auth-card max-w-2xl animate-scale-in">
      <div class="text-center">
        <div class="auth-logo-switcher" aria-label="Banking System logo">
        <img src="assets/logo.png" alt="Banking System logo" class="auth-logo logo-light" />
        <img src="assets/logo-dark.png" alt="Banking System logo" class="auth-logo logo-dark" />
      </div>
        <span class="demo-status-pill demo-status-info">Demo account</span>
        <h1 class="auth-title text-3xl sm:text-4xl">Create account</h1>
        <p class="auth-subtitle text-sm sm:text-base">This demo form is styled for client presentation. Submit returns you to sign in.</p>
      </div>

      <form #signupForm="ngForm" (ngSubmit)="submitDemoSignup()" class="mt-7 space-y-5">
        <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
          <div>
            <label for="signup-name" class="auth-field-label"><i class="fas fa-user mr-2"></i>Full name</label>
            <input id="signup-name" name="fullName" type="text" required autocomplete="name" placeholder="Amara Perera" class="glass-input w-full" />
          </div>
          <div>
            <label for="signup-email" class="auth-field-label"><i class="fas fa-envelope mr-2"></i>Email address</label>
            <input id="signup-email" name="email" type="email" required autocomplete="email" placeholder="amara@banking.demo" class="glass-input w-full" />
          </div>
        </div>

        <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
          <div>
            <label for="signup-password" class="auth-field-label"><i class="fas fa-lock mr-2"></i>Password</label>
            <input id="signup-password" name="password" type="password" required autocomplete="new-password" placeholder="Create a password" class="glass-input w-full" />
          </div>
          <div>
            <label for="signup-confirm-password" class="auth-field-label"><i class="fas fa-lock mr-2"></i>Confirm password</label>
            <input id="signup-confirm-password" name="confirmPassword" type="password" required autocomplete="new-password" placeholder="Retype password" class="glass-input w-full" />
          </div>
        </div>

        <label for="agreeTerms" class="flex items-start gap-3 rounded-2xl border border-white/10 bg-white/[0.06] p-4 text-sm text-slate-300">
          <input id="agreeTerms" name="terms" type="checkbox" required class="mt-1 h-4 w-4 rounded border-white/30 bg-white/20 text-cyan-500 focus:ring-cyan-300" />
          <span>I understand this is a client demo account flow using sample data.</span>
        </label>

        <button type="submit" class="glass-button w-full justify-center py-4">
          <span class="flex items-center justify-center gap-3">
            Continue to sign in
            <i class="fas fa-arrow-right"></i>
          </span>
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-slate-300">
        Already have access?
        <a routerLink="/sign-in" class="auth-link ml-1">Sign in</a>
      </p>
    </div>
  </section>
</main>
