<main class="auth-shell">
  <section class="auth-panel">
    <div class="auth-card animate-scale-in">
      <div class="text-center">
        <img src="assets/logo.png" alt="Banking System logo" class="auth-logo" />
        <span class="demo-status-pill demo-status-info">Demo gateway</span>
        <h1 class="auth-title text-3xl sm:text-4xl">Sign in</h1>
        <p class="auth-subtitle text-sm sm:text-base">Use credentials for a real backend, or open a ready-made role demo.</p>
      </div>

      <form #frm="ngForm" (ngSubmit)="authenticate()" class="mt-7 space-y-5">
        <div>
          <label for="signin-email" class="auth-field-label"><i class="fas fa-envelope mr-2"></i>Email address</label>
          <input id="signin-email" type="email" name="email" #emailModel="ngModel" [(ngModel)]="email" required autocomplete="email" placeholder="client.customer@finflow.demo" class="glass-input w-full" />
          <p *ngIf="emailModel.invalid && emailModel.dirty" class="mt-2 text-sm text-red-200">Please enter a valid email address.</p>
        </div>

        <div>
          <label for="signin-password" class="auth-field-label"><i class="fas fa-lock mr-2"></i>Password</label>
          <input id="signin-password" type="password" name="password" #passwordModel="ngModel" [(ngModel)]="password" required autocomplete="current-password" placeholder="Enter your password" class="glass-input w-full" />
          <p *ngIf="passwordModel.invalid && passwordModel.dirty" class="mt-2 text-sm text-red-200">Password is required.</p>
        </div>

        <button type="submit" class="glass-button w-full justify-center py-4" [disabled]="frm.invalid || isLoading" [class.opacity-50]="frm.invalid || isLoading">
          <span class="flex items-center justify-center gap-3">
            {{ isLoading ? 'Signing in...' : 'Sign in' }}
            <i class="fas fa-arrow-right"></i>
          </span>
        </button>
      </form>

      <div class="my-6 flex items-center gap-3 text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">
        <span class="h-px flex-1 bg-white/15"></span>
        Demo roles
        <span class="h-px flex-1 bg-white/15"></span>
      </div>

      <div class="auth-demo-grid">
        <button type="button" class="auth-demo-btn" aria-label="Open customer demo dashboard" (click)="launchDemo('CUSTOMER')"><i class="fas fa-user"></i>Customer</button>
        <button type="button" class="auth-demo-btn" aria-label="Open employee demo dashboard" (click)="launchDemo('EMPLOYEE')"><i class="fas fa-user-tie"></i>Employee</button>
        <button type="button" class="auth-demo-btn" aria-label="Open manager demo dashboard" (click)="launchDemo('MANAGER')"><i class="fas fa-chart-line"></i>Manager</button>
      </div>

      <p class="mt-6 text-center text-sm text-slate-300">
        Need a demo account?
        <a routerLink="/sign-up" class="auth-link ml-1">Create one</a>
      </p>
    </div>
  </section>
</main>
