<main class="auth-shell">
  <section class="auth-panel max-w-5xl">
    <div class="auth-brand-card">
      <img src="assets/logo.png" alt="Banking System logo" class="auth-logo" />
      <span class="demo-status-pill demo-status-info">Live client demo</span>
      <h1 class="auth-title">Banking operations demo for clients.</h1>
      <p class="auth-subtitle">
        A simple Angular demo for customer banking, employee operations, and manager loan approvals using realistic sample data.
      </p>
      <div class="auth-actions">
        <button type="button" class="glass-button" (click)="gotoSignin()" aria-label="Open the demo sign in page">
          Open demo
          <i class="fas fa-arrow-right ml-2"></i>
        </button>
        <button type="button" class="glass-button-secondary" (click)="gotoSignin()" aria-label="View available demo roles">
          View demo roles
        </button>
      </div>
      <p class="auth-note">No backend setup required. Choose a role on the next screen.</p>
    </div>
  </section>
</main>
