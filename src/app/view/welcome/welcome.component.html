<main class="auth-shell">
  <section class="auth-panel max-w-5xl">
    <div class="auth-brand-card">
      <img src="assets/logo-dark.png" alt="Banking System logo" class="auth-logo logo-dark-static" />
      <span class="demo-status-pill demo-status-info">Digital banking workspace</span>
      <h1 class="auth-title">Modern banking operations, presented clearly.</h1>
      <p class="auth-subtitle">
        A polished customer banking experience for account visibility, transfers, fixed deposits, and loan workflows.
      </p>
      <div class="auth-actions">
        <button type="button" class="glass-button" (click)="gotoSignin()" aria-label="Open sign in page">
          Get started
          <i class="fas fa-arrow-right ml-2"></i>
        </button>
      </div>
    </div>
  </section>
</main>
